name: SecureAgent CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/app/db.py
          python -m py_compile backend/app/security.py
          python -m py_compile backend/app/policy_loader.py
          python -m py_compile backend/app/ws_manager.py
          python -m py_compile backend/app/agent/planner.py
          python -m py_compile backend/app/agent/executor.py
          python -m py_compile backend/security/auth.py

      - name: Run tests
        run: |
          pytest tests -q