name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Verify imports
        run: |
          PYTHONPATH=. python -c "import backend; print('backend import ok')"
          PYTHONPATH=. python -c "import backend.app.main; print('main import ok')"

      - name: Run red-team test suite
        run: |
          PYTHONPATH=. python -m tests.run_red_team_cases

      - name: Run pytest
        run: |
          PYTHONPATH=. pytest -q