blocked_patterns:
  - ignore previous instructions
  - reveal system prompt
  - jailbreak
  - bypass
  - developer message

exfiltration_patterns:
  - api key
  - password
  - token
  - secret

output_sensitive_patterns:
  - api key
  - password
  - secret
  - token
  - sk-
  - bearer
  - private key

output_action: redact

allowed_tools:
  - calculator
  - notes_store
  - demo_leak

roles:
  user:
    allowed_tools:
      - calculator

  admin:
    allowed_tools:
      - calculator
      - notes_store
      - demo_leak

  auditor:
    allowed_tools: []

block_threshold: 60

risk_scores:
  prompt_injection: 60
  exfiltration: 60
  tool_abuse: 80
  role_violation: 70
  output_leakage: 75